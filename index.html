<!DOCTYPE html>
<html lang="pt-BR" xmlns:mso="urn:schemas-microsoft-com:office:office" xmlns:msdt="uuid:C2F41010-65B3-11d1-A29F-00AA00C14882">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Desafio 6W2H</title>
  <link rel="icon" type="image/png" href="assets/logos/logoapp.png" />
  <link rel="stylesheet" href="style.css" />

  <!--[if gte mso 9]><xml>
  <mso:CustomDocumentProperties>
    <mso:MediaServiceImageTags msdt:dt="string"></mso:MediaServiceImageTags>
    <mso:lcf76f155ced4ddcb4097134ff3c332f msdt:dt="string"></mso:lcf76f155ced4ddcb4097134ff3c332f>
    <mso:i0f84bba906045b4af568ee102a52dcb msdt:dt="string">Daily Work Documents [Standard]|c1df7c93-bf29-4bb4-a9f3-5b7aacc5e62b</mso:i0f84bba906045b4af568ee102a52dcb>
    <mso:TaxCatchAll msdt:dt="string">15;#Daily Work Documents [Standard]|c1df7c93-bf29-4bb4-a9f3-5b7aacc5e62b</mso:TaxCatchAll>
    <mso:RevIMBCS msdt:dt="string">15;#Daily Work Documents [Standard]|c1df7c93-bf29-4bb4-a9f3-5b7aacc5e62b</mso:RevIMBCS>
  </mso:CustomDocumentProperties>
  </xml><![endif]-->
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-orb orb-1" aria-hidden="true"></div>
  <div class="bg-orb orb-2" aria-hidden="true"></div>

  <div class="app-shell">
    <header class="topbar">
      <div class="brand-wrap">
        <div class="brand-badge">
          <img src="assets/logos/pillar.png" alt="Logo do Pilar" class="brand-logo">
        </div>

        <div class="brand-text-wrap">
          <p class="eyebrow">Loss Elimination</p>
          <h1>Desafio 6W2H</h1>
        </div>
      </div>

      <div class="topbar-right">
        <button id="rankingBtn" class="ghost-pill" type="button" data-action="open-ranking">
          🏅 Ranking
        </button>

        <button id="competitiveToggle" class="competitive-pill" type="button" data-action="toggle-competitive">
          🏆 Modo competitivo: OFF
        </button>

        <div class="plant-logo-wrap">
          <img src="assets/logos/planta.png" alt="Logo da Planta Louveira" class="plant-logo">
        </div>
      </div>
    </header>

    <main id="app" class="app"></main>
  </div>

  <div id="confetti-layer" class="confetti-layer" aria-hidden="true"></div>

  <div id="nameModal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="nameModalTitle">
    <div class="modal-card">
      <h3 id="nameModalTitle">Modo competitivo</h3>
      <p>Informe o nome do participante para registrar o resultado desta rodada.</p>

      <div class="modal-meta">
        <span id="participantAreaLabel">Área: -</span>
        <span id="participantModeLabel">Modo: -</span>
      </div>

      <input
        id="participantNameInput"
        class="modal-input"
        type="text"
        placeholder="Digite o nome do participante"
        maxlength="60"
        autocomplete="off"
      />

      <p id="nameModalError" class="modal-error" role="alert"></p>

      <div class="modal-actions">
        <button type="button" class="btn btn-light" data-action="close-modal">
          Cancelar
        </button>
        <button type="button" class="btn btn-primary" data-action="confirm-name">
          Confirmar e começar
        </button>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
